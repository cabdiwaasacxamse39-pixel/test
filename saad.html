<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maareeyaha Hawlaha - Web App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .task-done {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <!-- App Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Qorsheeyaha <span class="text-blue-600">Hawlaha</span></h1>
            <p class="text-gray-500 text-sm mt-2">Maareeyaha hawlahaaga maalin laha ah</p>
        </div>

        <!-- Input Area -->
        <div class="glass-morphism p-6 rounded-3xl shadow-xl mb-6">
            <div class="flex flex-col gap-3">
                <input type="text" id="taskInput" placeholder="Maxaa kuu qorsheysan maanta?" 
                    class="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all bg-white">
                <button id="addBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i> Ku dar Hawsha
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="flex justify-between items-center mb-4 px-2">
            <span class="text-sm font-semibold text-gray-600">Hawlaha: <span id="taskCount" class="text-blue-600">0</span></span>
            <button id="clearAll" class="text-sm text-red-500 hover:text-red-700 font-medium transition">Dhamaan tirtir</button>
        </div>

        <!-- Task List Area -->
        <div id="taskList" class="space-y-3">
            <!-- Hawlaha halkan ayay ku soo bixi doonaan -->
        </div>

        <!-- Empty State Message -->
        <div id="emptyState" class="text-center py-12 hidden">
            <div class="text-5xl mb-4">📝</div>
            <p class="text-gray-400">Ma jiraan hawlo kuu qorsheysan hadda.</p>
        </div>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const taskCount = document.getElementById('taskCount');
        const clearAll = document.getElementById('clearAll');
        const emptyState = document.getElementById('emptyState');

        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

        // Function to render tasks
        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            tasks.forEach((task, index) => {
                const taskItem = document.createElement('div');
                taskItem.className = `glass-morphism p-4 rounded-2xl flex items-center justify-between shadow-sm border-l-4 ${task.completed ? 'border-green-400' : 'border-blue-400'} animate-fade-in`;
                
                taskItem.innerHTML = `
                    <div class="flex items-center gap-3">
                        <button onclick="toggleTask(${index})" class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center transition ${task.completed ? 'bg-green-500 border-green-500 text-white' : 'hover:border-blue-500'}">
                            ${task.completed ? '<i class="fas fa-check text-xs"></i>' : ''}
                        </button>
                        <span class="font-medium text-gray-700 ${task.completed ? 'task-done' : ''}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${index})" class="text-gray-400 hover:text-red-500 transition p-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                taskList.appendChild(taskItem);
            });

            taskCount.innerText = tasks.length;
            localStorage.setItem('myTasks', JSON.stringify(tasks));
        }

        // Add Task
        function addTask() {
            const text = taskInput.value.trim();
            if (text) {
                tasks.push({ text, completed: false });
                taskInput.value = '';
                renderTasks();
            }
        }

        // Toggle Complete
        window.toggleTask = (index) => {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        };

        // Delete Task
        window.deleteTask = (index) => {
            tasks.splice(index, 1);
            renderTasks();
        };

        // Clear All
        clearAll.onclick = () => {
            if (tasks.length > 0) {
                if (confirm("Ma hubtaa inaad dhamaan tirtirto?")) {
                    tasks = [];
                    renderTasks();
                }
            }
        };

        // Event Listeners
        addBtn.onclick = addTask;
        taskInput.onkeypress = (e) => { if (e.key === 'Enter') addTask(); };

        // Initial Load
        renderTasks();
    </script>
</body>
</html>
